<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restablecer contraseña — GymSpeak</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .reset-wrap { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }
    .reset-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; text-decoration: none; color: var(--text-main); }
    .reset-logo img { height: 40px; width: auto; }
    .reset-logo span { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.5px; }
    .reset-card {
      width: 100%; max-width: 420px;
      background: var(--bg-card);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
      -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px);
      border-radius: 20px; padding: 32px 28px;
    }
    .reset-card h1 { font-size: 1.7rem; font-weight: 800; letter-spacing: -0.5px; }
    .reset-card h1 .hl {
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-green));
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    .reset-card .sub { color: var(--text-muted); margin-top: 6px; }
    label { display: block; font-size: 0.9rem; font-weight: 600; margin: 18px 0 6px; }
    input[type=password] {
      width: 100%; box-sizing: border-box; padding: 14px 16px;
      font-family: var(--font-family); font-size: 16px; color: var(--text-main);
      background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border);
      border-radius: 12px; transition: border-color 0.2s ease;
    }
    input[type=password]:focus { outline: none; border-color: var(--accent-green); }
    input::placeholder { color: var(--text-muted); }
    button.btn-primary { width: 100%; margin-top: 24px; border: none; font-size: 16px; font-family: var(--font-family); }
    button.btn-primary:disabled { opacity: 0.55; cursor: default; transform: none; box-shadow: 0 0 20px rgba(57, 255, 20, 0.3); }
    .msg { margin-top: 18px; padding: 12px 14px; border-radius: 12px; font-size: 0.95rem; border: 1px solid; line-height: 1.5; }
    .msg.error { background: rgba(255, 80, 80, 0.1); border-color: rgba(255, 80, 80, 0.3); color: #ff8a8a; }
    .msg.ok { background: rgba(57, 255, 20, 0.08); border-color: rgba(57, 255, 20, 0.3); color: var(--accent-green); }
    .hint { color: var(--text-muted); }
    .hidden { display: none; }
    @media (max-width: 480px) { .reset-card { padding: 26px 20px; } }
  </style>
</head>
<body>
  <div class="reset-wrap">
    <a href="/" class="reset-logo">
      <img src="assets/images/logo.png" alt="GymSpeak Logo">
      <span>GymSpeak</span>
    </a>

    <div class="reset-card">
      <h1>Restablecer <span class="hl">contraseña</span></h1>

      <!-- Estado: cargando / enlace inválido -->
      <div id="loading" class="sub" style="margin-top:14px;">Comprobando el enlace…</div>
      <div id="invalid" class="msg error hidden">
        Este enlace no es válido o ha caducado. Vuelve a la app y pide uno nuevo desde “¿Olvidaste tu contraseña?”.
      </div>

      <!-- Formulario de nueva contraseña -->
      <form id="form" class="hidden" autocomplete="off">
        <p class="sub">Elige tu nueva contraseña.</p>
        <label for="pw">Nueva contraseña</label>
        <input id="pw" type="password" placeholder="Mínimo 8 caracteres" autocomplete="new-password" minlength="8" required>
        <label for="pw2">Repetir contraseña</label>
        <input id="pw2" type="password" placeholder="Repite la contraseña" autocomplete="new-password" minlength="8" required>
        <button id="submit" class="btn-primary" type="submit">Guardar contraseña</button>
        <div id="formError" class="msg error hidden"></div>
      </form>

      <!-- Éxito -->
      <div id="success" class="msg ok hidden">
        ✅ Tu contraseña se ha cambiado. Vuelve a la app GymSpeak e inicia sesión con la nueva contraseña.
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    (function () {
      var SUPABASE_URL = 'https://datuqilcshjvapujdool.supabase.co';
      var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRhdHVxaWxjc2hqdmFwdWpkb29sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNDgxMzIsImV4cCI6MjA5NDYyNDEzMn0.q6AZirRR1UsKKdkxvnmlmPDVQx09T-FckLl03aRh5Gw';

      var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
        auth: { detectSessionInUrl: false, persistSession: false, autoRefreshToken: false },
      });

      var $ = function (id) { return document.getElementById(id); };
      function show(id) { $(id).classList.remove('hidden'); }
      function hide(id) { $(id).classList.add('hidden'); }

      // Leer los tokens del fragmento (#access_token=...&type=recovery) o del
      // query (?...): según el flujo, Supabase los entrega en uno u otro.
      var hash = window.location.hash.charAt(0) === '#' ? window.location.hash.slice(1) : window.location.hash;
      var p = new URLSearchParams(hash);
      var q = new URLSearchParams(window.location.search);
      var accessToken = p.get('access_token') || q.get('access_token');
      var refreshToken = p.get('refresh_token') || q.get('refresh_token');
      var type = p.get('type') || q.get('type');
      var errorDesc = p.get('error_description') || q.get('error_description');

      // Quitar el token de la barra de direcciones / historial.
      try { history.replaceState(null, '', window.location.pathname); } catch (e) {}

      function fail() { hide('loading'); show('invalid'); }

      if (errorDesc || !accessToken || !refreshToken || type !== 'recovery') {
        fail();
        return;
      }

      sb.auth.setSession({ access_token: accessToken, refresh_token: refreshToken })
        .then(function (res) {
          if (res.error) { fail(); return; }
          hide('loading');
          show('form');
        })
        .catch(fail);

      $('form').addEventListener('submit', function (e) {
        e.preventDefault();
        hide('formError');
        var pw = $('pw').value;
        var pw2 = $('pw2').value;
        if (pw.length < 8) {
          $('formError').textContent = 'La contraseña debe tener al menos 8 caracteres.';
          show('formError');
          return;
        }
        if (pw !== pw2) {
          $('formError').textContent = 'Las contraseñas no coinciden.';
          show('formError');
          return;
        }
        $('submit').disabled = true;
        $('submit').textContent = 'Guardando…';
        sb.auth.updateUser({ password: pw })
          .then(function (res) {
            if (res.error) {
              $('formError').textContent = res.error.message || 'No se pudo cambiar la contraseña. El enlace puede haber caducado.';
              show('formError');
              $('submit').disabled = false;
              $('submit').textContent = 'Guardar contraseña';
              return;
            }
            hide('form');
            show('success');
          })
          .catch(function () {
            $('formError').textContent = 'Error de red. Inténtalo de nuevo.';
            show('formError');
            $('submit').disabled = false;
            $('submit').textContent = 'Guardar contraseña';
          });
      });
    })();
  </script>
</body>
</html>
